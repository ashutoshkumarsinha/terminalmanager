name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-notarize:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: swift build -c release

      - name: Test
        run: swift test

      - name: Package app
        run: bash scripts/package-app.sh release

      - name: Create DMG
        run: bash scripts/create-dmg.sh

      - name: Notarize (requires secrets)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            bash scripts/notarize-dmg.sh
          else
            echo "Skipping notarization — set APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID secrets."
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terminalmanager-release
          path: |
            dist/
            build/
