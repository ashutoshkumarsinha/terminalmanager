name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release

      - name: Test
        run: swift test

      - name: GUI smoke (CLI)
        run: swift test --filter ProcessLaunchSmokeTests

      - name: UI tests (XCUITest)
        run: bash scripts/run-ui-tests.sh

      - name: Package app
        run: bash scripts/package-app.sh release
